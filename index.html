<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overlapping Shapes</title>
    <style>
        /* Container for the shapes to handle positioning */
        .container {
            position: relative;
            width: 300px;
            height: 200px;
            margin: 50px;
        }

        /* Basic shape properties */
        .shape {
            position: absolute;
            box-sizing: border-box; /* Ensures border is included in dimensions */
        }

        /* Styling for the rectangle */
        .rectangle {
            width: 150px;
            height: 120px;
            background-color: blue;
            border: 3px solid black;
            top: 0;
            left: 0;
            z-index: 1; /* Sets stacking order */
        }

        /* Styling for the circle */
        .circle {
            width: 100px;
            height: 100px;
            background-color: yellow;
            border: 4px solid #FF5733; /* Matches the reddish-orange border color */
            border-radius: 50%; /* Makes the square a circle */
            top: 25px; /* Positions vertically inside the container */
            left: 80px; /* Positions to overlap the rectangle */
            z-index: 2; /* Places circle on top of the rectangle */
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="shape rectangle"></div>
        <div class="shape circle"></div>
    </div>

</body>
</html>
