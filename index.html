<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overlapping Shapes</title>
    <style>
        /* This rule styles the outer container for positioning */
        .container {
            position: relative; /* Establish relative positioning for children */
            width: 400px;
            height: 250px;
            margin: 50px auto; /* Centering for better visibility */
            border: 1px solid #ccc; /* Adding a light border to see the container */
        }

        /* This rule creates the rectangle */
        .rectangle {
            position: absolute; /* Place relative to the .container */
            top: 50px; /* Distance from the top of .container */
            left: 50px; /* Distance from the left of .container */
            width: 200px; /* The rectangle's width */
            height: 100px; /* The rectangle's height */
            background-color: blue; /* Set the fill color to blue */
            border: 2px solid black; /* Add a black border */
        }

        /* This rule creates the circle */
        .circle {
            position: absolute; /* Place relative to the .container */
            top: 50px; /* Distance from top of .container, same as rectangle for overlap */
            left: 150px; /* Distance from left of .container to create overlap */
            width: 100px; /* Square base: width = height */
            height: 100px; /* Square base: height = width */
            background-color: yellow; /* Set the fill color to yellow */
            border: 2px solid red; /* Add a red border */
            border-radius: 50%; /* The key to making it a circle instead of a square */
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="rectangle"></div>
        
        <div class="circle"></div>
    </div>

</body>
</html>
