<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>HTML/CSS 圖案生成</title>
    <style>
        /* 畫布容器，確保元素定位參考此區域 */
        .canvas {
            position: relative;
            width: 400px;
            height: 300px;
            margin: 50px;
            background-color: white;
        }

        /* 藍色正方形 */
        .blue-square {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 200px;
            height: 200px;
            background-color: #0000FF; /* 純藍色 */
            border: 4px solid black;   /* 黑色外框 */
            z-index: 1;                /* 層級在下 */
        }
        /* 黃色圓形 */
        .yellow-circle {
            position:relative;
            top: 20px;                 /* 調整上下位置 */
            left: 140px;               /* 調整左右位置，使其重疊 */
            width: 200px;
            height: 170px;
            background-color: #FFFF66; /* 明亮的黃色 */
            border: 8px solid #FF3333; /* 較粗的紅色邊框 */
            border-radius: 50%;        /* 變成圓形 */
            z-index: 2;                /* 層級在上，覆蓋正方形 */
        }
    </style>
</head>
<body>

    <div class="canvas">
        <div class="blue-square"></div>
        <div class="yellow-circle"></div>
    </div>

</body>
</html>
